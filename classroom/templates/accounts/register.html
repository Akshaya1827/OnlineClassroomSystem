{% extends 'layout.html' %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">

        <h2>Create Account</h2>
        <p class="subtitle">Join the classroom platform</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
    {{ form.username}}
    <label>Username</label>
</div>

<div class="form-group">
    {{ form.email}}
    <label>Email</label>
</div>

<div class="form-group">
    {{ form.role }}
    <label>Role</label>
</div>

<div class="form-group">
    {{ form.password1 }}
    <label>Password</label>
</div>

<div class="form-group">
    {{ form.password2 }}
    <label>Confirm Password</label>
</div>

            <button type="submit" class="btn-primary">
                Register
            </button>
        </form>

        <p class="auth-footer">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>
</div>

{% endblock %}
