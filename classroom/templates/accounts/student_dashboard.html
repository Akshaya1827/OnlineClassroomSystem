{% extends 'layout.html' %}

{% block content %}

<div class="content">

    <div class="top-bar">
        <h2>My Courses</h2>
        <a href="{% url 'join_course' %}" class="btn-primary">
             Join Course
        </a>
    </div>

    <div class="course-grid">
        {% for course in courses %}
            <a href="{% url 'course_detail' course.id %}" class="course-link">
                <div class="course-card">
                    <div class="course-header">
                        <h3>{{ course.name }}</h3>
                        <p>{{ course.subject }}</p>
                    </div>
                </div>
            </a>
        {% endfor %}
    </div>

</div>

{% endblock %}
