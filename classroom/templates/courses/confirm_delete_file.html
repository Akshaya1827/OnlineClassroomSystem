{% extends 'layout.html' %}
{% block title %}Delete File{% endblock %}

{% block content %}

<div class="content">

    <!-- DELETE CARD -->
    <div class="card delete-card">

        <h2>Delete File</h2>

        <p class="delete-text">
            Are you sure you want to delete this file?
        </p>

        <!-- FILE NAME -->
        <div class="file-preview">
            📄 {{ file.file.name|cut:"course_materials/" }}
        </div>

        <!-- ACTION BUTTONS -->
        <form method="POST">
            {% csrf_token %}

            <div class="delete-actions">
                <button type="submit" class="btn-danger">
                    🗑 Yes, Delete
                </button>

                <a href="{% url 'view_materials' file.material.course.id %}" class="btn-secondary">
                    Cancel
                </a>
            </div>
        </form>

    </div>

</div>

{% endblock %}
