{% extends 'layout.html' %}
{% block title %}Delete Material{% endblock %}

{% block content %}

<div class="content">

    <!-- DELETE CARD -->
    <div class="card delete-card">

        <h2>⚠ Delete Material</h2>

        <p class="delete-text">
            Are you sure you want to delete this material?
        </p>

        <!-- MATERIAL PREVIEW -->
        <div class="file-preview">
            📘 {{ material.title }}
        </div>

        <!-- DESCRIPTION (optional but nice) -->
        <p style="color:#aaa; margin-top:10px;">
            {{ material.description }}
        </p>

        <!-- ACTION BUTTONS -->
        <form method="POST">
            {% csrf_token %}

            <div class="delete-actions">
                <button type="submit" class="btn-danger">
                    🗑 Yes, Delete
                </button>

                <a href="{% url 'view_materials' material.course.id %}" class="btn-secondary">
                    Cancel
                </a>
            </div>
        </form>

    </div>

</div>

{% endblock %}
